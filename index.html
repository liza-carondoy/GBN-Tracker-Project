<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GBN Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --green:       #1a7a56;
    --green-light: #e6f4ed;
    --green-mid:   #2da06e;
    --green-dark:  #0f4d35;
    --amber:       #c07a14;
    --amber-light: #fef3e2;
    --red:         #b93b3b;
    --red-light:   #fdeaea;
    --blue:        #1a56a8;
    --blue-light:  #e8f0fb;
    --gray-50:     #f8f8f7;
    --gray-100:    #f0efec;
    --gray-200:    #e3e1db;
    --gray-300:    #c8c5bc;
    --gray-500:    #888580;
    --gray-700:    #4a4845;
    --gray-900:    #1c1b19;
    --white:       #ffffff;
    --radius-sm:   4px;
    --radius-md:   8px;
    --radius-lg:   12px;
    --font-sans:   'Inter', system-ui, sans-serif;
    --font-mono:   'DM Mono', monospace;
    --shadow-sm:   0 1px 3px rgba(0,0,0,.07), 0 1px 2px rgba(0,0,0,.05);
    --shadow-md:   0 4px 12px rgba(0,0,0,.09), 0 2px 6px rgba(0,0,0,.06);
  }

  /* ── DARK MODE VARIABLES ─────────────────── */
  body.dark {
    --green:       #2ecc8e;
    --green-light: #0d2e1f;
    --green-mid:   #2ecc8e;
    --green-dark:  #1a7a56;
    --amber:       #f0a832;
    --amber-light: #2e2108;
    --red:         #e05555;
    --red-light:   #2e0f0f;
    --blue:        #4a90d9;
    --blue-light:  #0d1f38;
    --gray-50:     #141414;
    --gray-100:    #1e1e1e;
    --gray-200:    #2a2a2a;
    --gray-300:    #3d3d3d;
    --gray-500:    #888888;
    --gray-700:    #cccccc;
    --gray-900:    #f0f0f0;
    --white:       #1a1a1a;
    --shadow-sm:   0 1px 3px rgba(0,0,0,.4), 0 1px 2px rgba(0,0,0,.3);
    --shadow-md:   0 4px 12px rgba(0,0,0,.5), 0 2px 6px rgba(0,0,0,.4);
  }

  /* Dark mode specific overrides */
  body.dark { background: #111111; color: var(--gray-900); }
  body.dark .topbar { background: #1a1a1a; border-color: var(--gray-200); }
  body.dark .stat-card { background: #1e1e1e; border-color: var(--gray-200); }
  body.dark .toolbar { background: #1e1e1e; border-color: var(--gray-200); }
  body.dark .table-card { background: #1e1e1e; border-color: var(--gray-200); }
  body.dark thead tr { background: #252525; }
  body.dark tr:hover td { background: #252525; }
  body.dark td { border-color: #2a2a2a; color: #cccccc; }
  body.dark th { color: #888888; }
  body.dark .modal { background: #1e1e1e; border-color: var(--gray-200); }
  body.dark input, body.dark select, body.dark textarea { background: #2a2a2a; border-color: #3d3d3d; color: #f0f0f0; }
  body.dark input:focus, body.dark select:focus, body.dark textarea:focus { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(74,144,217,.15); }
  body.dark .btn-secondary { background: #2a2a2a; color: #cccccc; border-color: #3d3d3d; }
  body.dark .btn-secondary:hover { background: #333333; }
  body.dark .btn-cancel { background: transparent; border-color: #3d3d3d; color: #888888; }
  body.dark .btn-cancel:hover { background: #2a2a2a; }
  body.dark .page-btn { background: #2a2a2a; border-color: #3d3d3d; color: #cccccc; }
  body.dark .page-btn:hover { background: #333333; }
  body.dark .page-btn.active { background: var(--blue); border-color: var(--blue); color: #fff; }
  body.dark .brand-name { color: #f0f0f0; }
  body.dark .brand-sep { color: #3d3d3d; }
  body.dark .icon-btn { color: #888888; }
  body.dark .icon-btn:hover { background: #2a2a2a; color: #f0f0f0; }
  body.dark .icon-btn.delete:hover { background: var(--red-light); color: var(--red); }
  body.dark .modal-close { background: #2a2a2a; color: #888888; }
  body.dark .modal-close:hover { background: #333333; }
  body.dark .modal-header { border-color: #2a2a2a; }
  body.dark .modal-footer { border-color: #2a2a2a; }
  body.dark .badge-pending { background: #2a2a2a; color: #888888; }
  body.dark .result-count { color: #888888; }
  body.dark .count-info { color: #888888; }
  body.dark .pagination { border-color: #2a2a2a; }
  body.dark ::-webkit-scrollbar-thumb { background: #3d3d3d; }

  /* Dark mode toggle button */
  .dark-toggle {
    width: 36px; height: 36px;
    border-radius: var(--radius-md);
    border: 1px solid var(--gray-200);
    background: var(--white);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    color: var(--gray-500);
    transition: all .2s ease;
    flex-shrink: 0;
  }
  .dark-toggle:hover { background: var(--gray-100); color: var(--gray-900); }
  body.dark .dark-toggle { background: #2a2a2a; border-color: #3d3d3d; color: #f0a832; }
  body.dark .dark-toggle:hover { background: #333333; }

  html { font-size: 16px; }
  body { font-family: var(--font-sans); background: var(--gray-50); color: var(--gray-900); min-height: 100vh; }

  /* ── TOPBAR ─────────────────────────────── */
  .topbar {
    background: var(--white);
    border-bottom: 1px solid var(--gray-200);
    padding: 0 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 60px;
    position: sticky;
    top: 0;
    z-index: 50;
    box-shadow: var(--shadow-sm);
  }
  .topbar-brand { display: flex; align-items: center; gap: 12px; }
  .brand-pill {
    background: #1a56a8;
    color: var(--white);
    font-family: var(--font-mono);
    font-weight: 500;
    font-size: 13px;
    letter-spacing: 1px;
    padding: 5px 12px;
    border-radius: var(--radius-sm);
  }
  .brand-name { font-size: 16px; font-weight: 600; color: var(--gray-900); }
  .brand-sep { color: var(--gray-300); font-size: 18px; }
  .brand-sub { font-size: 12px; color: var(--gray-500); }
  .topbar-actions { display: flex; gap: 10px; align-items: center; }

  /* ── BUTTONS ─────────────────────────────── */
  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 8px 16px; border-radius: var(--radius-md);
    font-size: 13px; font-weight: 500; cursor: pointer;
    border: none; transition: all .15s ease;
    text-decoration: none; white-space: nowrap;
  }
  .btn-primary { background: #1a56a8; color: var(--white); }
  .btn-primary:hover { background: #133f80; }
  .btn-secondary {
    background: var(--white); color: var(--gray-700);
    border: 1px solid var(--gray-200);
  }
  .btn-secondary:hover { background: var(--gray-100); }
  .btn-danger { background: var(--red-light); color: var(--red); border: 1px solid #f5c0c0; }
  .btn-danger:hover { background: #fad6d6; }
  .btn svg { width: 15px; height: 15px; flex-shrink: 0; }

  /* ── LAYOUT ─────────────────────────────── */
  .page { max-width: 1400px; margin: 0 auto; padding: 2rem 2rem 4rem; }

  /* ── STAT CARDS ─────────────────────────── */
  .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin-bottom: 1.75rem; }
  .stat-card {
    background: var(--white); border: 1px solid var(--gray-200);
    border-radius: var(--radius-lg); padding: 1rem 1.25rem;
    box-shadow: var(--shadow-sm);
  }
  .stat-label { font-size: 11px; font-weight: 500; text-transform: uppercase; letter-spacing: .6px; color: var(--gray-500); margin-bottom: 6px; }
  .stat-value { font-size: 28px; font-weight: 600; line-height: 1; }
  .stat-value.green  { color: var(--green); }
  .stat-value.amber  { color: var(--amber); }
  .stat-value.red    { color: var(--red); }
  .stat-value.blue   { color: var(--blue); }
  .stat-value.dark   { color: var(--gray-900); }

  /* ── TOOLBAR ─────────────────────────────── */
  .toolbar {
    background: var(--white); border: 1px solid var(--gray-200);
    border-radius: var(--radius-lg); padding: 14px 16px;
    display: flex; gap: 10px; align-items: center; flex-wrap: wrap;
    margin-bottom: 1rem; box-shadow: var(--shadow-sm);
  }
  .search-wrap { position: relative; flex: 1; min-width: 200px; }
  .search-wrap svg { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--gray-500); width:15px; height:15px; pointer-events:none; }
  .search-wrap input { padding-left: 34px; width: 100%; }
  input[type=text], input[type=date], input[type=search], select, textarea {
    font-family: var(--font-sans);
    font-size: 13px;
    border: 1px solid var(--gray-200);
    border-radius: var(--radius-md);
    padding: 8px 12px;
    background: var(--white);
    color: var(--gray-900);
    width: 100%;
    outline: none;
    transition: border-color .15s;
  }
  input:focus, select:focus, textarea:focus { border-color: #4a82d0; box-shadow: 0 0 0 3px rgba(26,86,168,.12); }
  select { cursor: pointer; min-width: 150px; }
  textarea { resize: vertical; min-height: 70px; }
  .toolbar-filters { display: flex; gap: 8px; flex-wrap: wrap; }
  .toolbar-filters select { width: auto; }
  .btn-today {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 8px 14px; border-radius: var(--radius-md);
    font-size: 13px; font-weight: 500; cursor: pointer;
    border: 1px solid var(--gray-200);
    background: var(--white); color: var(--gray-700);
    transition: all .15s ease; white-space: nowrap;
  }
  .btn-today:hover { background: var(--blue-light); color: var(--blue); border-color: var(--blue); }

  /* Date filter picker */
  .date-filter-wrap {
    display: inline-flex; align-items: center; justify-content: center;
    width: 36px; height: 36px;
    border: 1px solid var(--gray-200);
    border-radius: var(--radius-md);
    background: var(--white);
    color: var(--gray-500);
    cursor: pointer;
    transition: all .15s ease;
    position: relative;
    flex-shrink: 0;
  }
  .date-filter-wrap:hover { border-color: var(--blue); color: var(--blue); background: var(--blue-light); }
  .date-filter-wrap.has-value { border-color: var(--blue); background: var(--blue); color: #fff; }
  .date-filter-wrap input[type="date"] {
    position: absolute; inset: 0; width: 100%; height: 100%;
    opacity: 0; cursor: pointer; border: none; padding: 0;
  }
  .date-filter-wrap input[type="date"]::-webkit-calendar-picker-indicator {
    position: absolute; inset: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer;
  }
  body.dark .date-filter-wrap { background: #2a2a2a; border-color: #3d3d3d; color: #888888; }
  body.dark .date-filter-wrap:hover { border-color: var(--blue); color: var(--blue); background: var(--blue-light); }
  body.dark .date-filter-wrap.has-value { background: var(--blue); border-color: var(--blue); color: #fff; }

  .result-count { font-size: 12px; color: var(--gray-500); white-space: nowrap; }

  /* ── TABLE ─────────────────────────────── */
  .table-card {
    background: var(--white); border: 1px solid var(--gray-200);
    border-radius: var(--radius-lg); overflow: hidden;
    box-shadow: var(--shadow-sm);
  }
  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  thead tr { background: var(--gray-50); border-bottom: 1px solid var(--gray-200); }
  th {
    padding: 10px 14px; text-align: left;
    font-size: 11px; font-weight: 600; text-transform: uppercase;
    letter-spacing: .5px; color: var(--gray-500);
    white-space: nowrap; cursor: pointer; user-select: none;
  }
  th:hover { color: var(--gray-900); }
  th .sort-icon { display: inline-block; margin-left: 4px; opacity: .4; font-size: 10px; }
  th.sorted .sort-icon { opacity: 1; color: var(--green); }
  td {
    padding: 10px 14px; border-bottom: 1px solid var(--gray-100);
    color: var(--gray-700); vertical-align: middle;
    max-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: var(--gray-50); }

  /* column widths */
  .col-gbn     { width: 130px; }
  .col-guest   { width: 200px; }
  .col-sched   { width: 140px; }
  .col-time    { width: 150px; }
  .col-pr      { width: 110px; }
  .col-status  { width: 110px; }
  .col-notes   { width: 160px; }
  .col-actions { width: 60px; text-align: center; }

  /* ── BADGES ─────────────────────────────── */
  .badge {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 3px 9px; border-radius: 20px;
    font-size: 11px; font-weight: 500; white-space: nowrap;
  }
  .badge-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
  .badge-completed  { background: var(--green-light);  color: var(--green-dark); }
  .badge-completed  .badge-dot { background: var(--green); }
  .badge-pending    { background: var(--gray-100);     color: var(--gray-500); }
  .badge-pending    .badge-dot { background: var(--gray-300); }
  .badge-refunded   { background: var(--red-light);    color: var(--red); }
  .badge-refunded   .badge-dot { background: var(--red); }
  .badge-rescheduled{ background: var(--amber-light);  color: var(--amber); }
  .badge-rescheduled .badge-dot { background: var(--amber); }

  /* ── EMPTY / NO RESULTS ─────────────────── */
  .empty-state {
    text-align: center; padding: 3rem 1rem;
    color: var(--gray-500); font-size: 14px;
  }
  .empty-state svg { width: 40px; height: 40px; margin: 0 auto 1rem; display: block; opacity: .35; }

  /* ── MODAL ─────────────────────────────── */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,.45);
    display: flex; align-items: center; justify-content: center;
    z-index: 200; padding: 1rem;
    opacity: 0; pointer-events: none; transition: opacity .2s;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal {
    background: var(--white); border-radius: var(--radius-lg);
    border: 1px solid var(--gray-200);
    width: 100%; max-width: 560px; max-height: 90vh; overflow-y: auto;
    box-shadow: var(--shadow-md);
    transform: translateY(16px); transition: transform .2s;
  }
  .modal-overlay.open .modal { transform: translateY(0); }
  .modal-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 1.25rem 1.5rem; border-bottom: 1px solid var(--gray-200);
  }
  .modal-header h2 { font-size: 16px; font-weight: 600; }
  .modal-close {
    width: 28px; height: 28px; border-radius: var(--radius-sm);
    border: none; background: var(--gray-100); cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    color: var(--gray-500); font-size: 16px;
    transition: background .15s;
  }
  .modal-close:hover { background: var(--gray-200); }
  .modal-body { padding: 1.5rem; }
  .modal-footer {
    padding: 1rem 1.5rem; border-top: 1px solid var(--gray-200);
    display: flex; justify-content: flex-end; gap: 8px;
  }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .form-full { grid-column: 1 / -1; }
  .form-group { display: flex; flex-direction: column; gap: 5px; }
  .form-label { font-size: 12px; font-weight: 500; color: var(--gray-700); }
  .form-required { color: var(--red); }

  /* ── ROW ACTION ─────────────────────────── */
  .row-actions { display: flex; align-items: center; justify-content: center; gap: 4px; }
  .icon-btn {
    width: 26px; height: 26px; border-radius: var(--radius-sm);
    border: none; background: transparent; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    color: var(--gray-500); transition: all .15s;
  }
  .icon-btn:hover { background: var(--gray-100); color: var(--gray-900); }
  .icon-btn.delete:hover { background: var(--red-light); color: var(--red); }
  .icon-btn svg { width: 14px; height: 14px; }

  /* ── TOAST ─────────────────────────────── */
  .toast-container { position: fixed; bottom: 24px; right: 24px; z-index: 300; display: flex; flex-direction: column; gap: 8px; }
  .toast {
    background: var(--gray-900); color: var(--white);
    padding: 10px 16px; border-radius: var(--radius-md);
    font-size: 13px; box-shadow: var(--shadow-md);
    animation: slideIn .2s ease; min-width: 200px;
  }
  .toast.success { background: var(--green-dark); }
  .toast.error   { background: var(--red); }
  @keyframes slideIn { from { transform: translateX(24px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
  @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

  /* ── PAGINATION ─────────────────────────── */
  .pagination {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 16px; border-top: 1px solid var(--gray-100);
    font-size: 12px; color: var(--gray-500); flex-wrap: wrap; gap: 8px;
  }
  .page-btns { display: flex; gap: 4px; }
  .page-btn {
    width: 30px; height: 30px; border-radius: var(--radius-sm);
    border: 1px solid var(--gray-200); background: var(--white);
    cursor: pointer; font-size: 12px; font-weight: 500;
    display: flex; align-items: center; justify-content: center;
    transition: all .15s; color: var(--gray-700);
  }
  .page-btn:hover { background: var(--gray-100); }
  .page-btn.active { background: var(--green); color: var(--white); border-color: var(--green); }
  .page-btn:disabled { opacity: .35; cursor: default; }

  /* ── SCROLLBAR ─────────────────────────── */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--gray-200); border-radius: 3px; }

  @media (max-width: 700px) {
    .topbar { padding: 0 1rem; }
    .brand-sub, .brand-sep { display: none; }
    .page { padding: 1rem 1rem 3rem; }
    .form-grid { grid-template-columns: 1fr; }
    .form-full { grid-column: 1; }
    .toolbar-filters select { min-width: 130px; }
  }
</style>
</head>
<body>

<!-- TOPBAR -->
<header class="topbar">
  <div class="topbar-brand">
    <span class="brand-pill">GBN</span>
    <span class="brand-name">GBN Tracker</span>
    <span class="brand-sep">|</span>
    <span class="brand-sub">Guest Booking Network</span>
  </div>
  <div class="topbar-actions">
    <button class="dark-toggle" id="darkToggle" onclick="toggleDark()" title="Toggle dark mode">
      <svg id="darkIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:16px;height:16px"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
    </button>
    <button class="btn btn-secondary" onclick="loadData()" title="Refresh from Google Sheets">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:15px;height:15px"><path d="M23 4v6h-6"/><path d="M1 20v-6h6"/><path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></svg>
      Refresh
    </button>
    <button class="btn btn-secondary" onclick="exportCSV()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      Export CSV
    </button>
    <button class="btn btn-primary" onclick="openModal()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Add Entry
    </button>
  </div>
</header>

<!-- MAIN -->
<main class="page">

  <!-- STATS -->
  <div class="stats-row" id="stats-row"></div>

  <!-- TOOLBAR -->
  <div class="toolbar">
    <div class="search-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" id="searchInput" placeholder="Search authors, hosts, notes…" oninput="render()">
    </div>
    <div class="toolbar-filters">
      <select id="filterGBN" onchange="render()">
        <option value="">All GBN hosts</option>
      </select>
      <select id="filterStatus" onchange="render()">
        <option value="">All statuses</option>
        <option value="completed">Completed</option>
        <option value="pending">Pending</option>
        <option value="rescheduled">Rescheduled</option>
        <option value="refunded">Refunded</option>
      </select>
      <select id="filterHost" onchange="render()">
        <option value="">All assignees</option>

      </select>
      <div class="date-filter-wrap" title="Filter by schedule date">

function toggleToday() {
  todayFilter = !todayFilter;

  render();

function getTodayString() {
  var now = new Date();
  var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  var fullMonths = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  return {
    year:       now.getFullYear(),
    month:      now.getMonth(),
    date:       now.getDate(),
    monthShort: months[now.getMonth()],
    monthFull:  fullMonths[now.getMonth()]
  };
}

function matchesToday(schedDate) {
  if (!schedDate) return false;
  var t = getTodayString();
  var s = schedDate.toLowerCase();
  if (!s.includes(String(t.year))) return false;
  if (!s.includes(t.monthShort.toLowerCase()) && !s.includes(t.monthFull.toLowerCase())) return false;
  var dayRegex = new RegExp('\b' + t.date + '\b');
  return dayRegex.test(s);
}

// ── GOOGLE SHEETS: READ ────────────────────────────────────────────────────────
function loadData() {
  showLoadingRow('Loading from Google Sheets...');
  var url = 'https://sheets.googleapis.com/v4/spreadsheets/' + SHEET_ID + '/values/Sheet1?key=' + API_KEY;
  fetch(url)
    .then(function(r) { return r.json(); })
    .then(function(json) {
      if (json.values && json.values.length > 1) {
        var rows = json.values;
        data = [];
        for (var i = 1; i < rows.length; i++) {
          var r = rows[i];
          if (!r[0] && !r[1]) continue;
          data.push({
            _id:      r[7] || String(i),
            gbn:      r[0] || '',
            guest:    r[1] || '',
            schedDate:r[2] || '',
            time:     r[3] || '',
            prStatus: r[4] || '',
            status:   r[5] || '',
            notes:    r[6] || ''
          });
        }
        populateFilters();
        renderStats();
        render();
        toast('Loaded ' + data.length + ' entries from Google Sheets ✅', 'success');
      } else {
        seedSheetWithData();
      }
    })
    .catch(function(err) {
      console.error('Load error:', err);
      toast('Could not reach Google Sheets. Showing local data.', 'error');
      data = SEED.map(function(r, i) { return Object.assign({ _id: String(Date.now() + i) }, r); });
      populateFilters();
      renderStats();
      render();
    });
}

// ── GOOGLE SHEETS: SEED ALL 844 ENTRIES ───────────────────────────────────────
function seedSheetWithData() {
  showLoadingRow('First-time setup: uploading all entries to Google Sheets...');
  toast('Uploading all 844 entries to Google Sheets — please wait...', 'success');

  // Show local data immediately while uploading
  data = SEED.map(function(r, i) { return Object.assign({ _id: String(Date.now() + i) }, r); });
  populateFilters();
  renderStats();
  render();

  // Send all rows via Apps Script bulkAdd
  var rows = SEED.map(function(r, i) {
    return { gbn: r.gbn, guest: r.guest, schedDate: r.schedDate, time: r.time,
             prStatus: r.prStatus, status: r.status, notes: r.notes, id: String(Date.now() + i) };
  });

  // Send in chunks of 100
  var chunkSize = 100;
  var chunks = [];
  for (var i = 0; i < rows.length; i += chunkSize) {
    chunks.push(rows.slice(i, i + chunkSize));
  }

  var idx = 0;
  function sendChunk() {
    if (idx >= chunks.length) {
      localStorage.setItem(SEEDED_KEY, '1');
      toast('All ' + SEED.length + ' entries saved to Google Sheets ✅', 'success');
      loadData();
      return;
    }
    showLoadingRow('Uploading entries ' + Math.min((idx + 1) * chunkSize, rows.length) + ' of ' + rows.length + '...');
    fetch(WEBAPP_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'bulkAdd', rows: chunks[idx] })
    }).finally(function() {
      idx++;
      setTimeout(sendChunk, 800);
    });
  }
  sendChunk();
}

  return fetch(WEBAPP_URL, {
    method: 'POST',
    mode: 'no-cors',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(Object.assign({ action: action }, entry))
  });
}

// ── HELPERS ────────────────────────────────────────────────────────────────────
function getStatus(r) {
  var pr = (r.prStatus || '').toUpperCase();
  var st = (r.status || '').toUpperCase();
  var nt = (r.notes || '').toUpperCase();
  if (pr === 'COMPLETED') return 'completed';
  if (pr === 'REFUNDED' || st === 'REFUNDED') return 'refunded';
  if (/RESCHED/.test(nt)) return 'rescheduled';
  return 'pending';
}

function badgeHtml(r) {
  var s = getStatus(r);
  var labels = { completed: 'Completed', pending: 'Pending', refunded: 'Refunded', rescheduled: 'Rescheduled' };
  return '<span class="badge badge-' + s + '"><span class="badge-dot"></span>' + labels[s] + '</span>';
}

function esc(str) {
  return (str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function trunc(str, n) {
  return str && str.length > n ? str.slice(0, n - 1) + '…' : (str || '');
}

// ── FILTERS ────────────────────────────────────────────────────────────────────
function getFiltered() {
  var q = (document.getElementById('searchInput').value || '').toLowerCase();
  var gbnF = document.getElementById('filterGBN').value;
  var statusF = document.getElementById('filterStatus').value;
  var hostF = document.getElementById('filterHost').value;
  var dateF = document.getElementById('filterDate').value; // YYYY-MM-DD

  // Toggle active style on calendar icon
  var wrap = document.getElementById('filterDate').parentElement;
  wrap.classList.toggle('has-value', !!dateF);

  return data.filter(function(r) {
    if (gbnF && r.gbn !== gbnF) return false;
    if (hostF && r.status !== hostF) return false;
    if (statusF && getStatus(r) !== statusF) return false;
    if (dateF) {
      // Convert filterDate "YYYY-MM-DD" to match against schedDate string
      var d = new Date(dateF + 'T12:00:00');
      var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
      var fullMonths = ['January','February','March','April','May','June','July','August','September','October','November','December'];
      var s = (r.schedDate || '').toLowerCase();
      var matchYear  = s.includes(String(d.getFullYear()));
      var matchMonth = s.includes(months[d.getMonth()].toLowerCase()) || s.includes(fullMonths[d.getMonth()].toLowerCase());
      var dayRegex   = new RegExp('\\b' + d.getDate() + '\\b');
      var matchDay   = dayRegex.test(s);
      if (!matchYear || !matchMonth || !matchDay) return false;
    }
    if (q) {
      var hay = [r.gbn, r.guest, r.schedDate, r.time, r.prStatus, r.status, r.notes].join(' ').toLowerCase();
      return hay.indexOf(q) > -1;
    }
    return true;
  });
}

function sortData(arr) {
  if (!sortCol) return arr;
  return arr.slice().sort(function(a, b) {
    var av, bv;
    if (sortCol === 'schedDate') {
      var da = parseSchedDate(a.schedDate);
      var db = parseSchedDate(b.schedDate);
      av = da ? da.getTime() : 0;
      bv = db ? db.getTime() : 0;
      return av < bv ? -sortDir : av > bv ? sortDir : 0;
    }
    av = (a[sortCol] || '').toLowerCase();
    bv = (b[sortCol] || '').toLowerCase();
    return av < bv ? -sortDir : av > bv ? sortDir : 0;
  });
}

// ── SORT ───────────────────────────────────────────────────────────────────────
function sortBy(col) {
  if (sortCol === col) { sortDir *= -1; } else { sortCol = col; sortDir = 1; }
  currentPage = 1;
  render();
}

// ── RENDER ─────────────────────────────────────────────────────────────────────
function render() {
  renderStats();
  var filtered = getFiltered();
  var sorted = sortData(filtered);

  // result count
  document.getElementById('resultCount').textContent = filtered.length + ' of ' + data.length + ' entries';

  // sort icons
  document.querySelectorAll('th').forEach(function(th) {
    th.classList.remove('sorted');
    var icon = th.querySelector('.sort-icon');
    if (icon) icon.textContent = '↕';
  });
  if (sortCol) {
    document.querySelectorAll('th').forEach(function(th) {
      if (th.getAttribute('onclick') === "sortBy('" + sortCol + "')") {
        th.classList.add('sorted');
        var icon = th.querySelector('.sort-icon');
        if (icon) icon.textContent = sortDir === 1 ? '↑' : '↓';
      }
    });
  }

  // pagination
  var total = sorted.length;
  var pages = Math.ceil(total / PAGE_SIZE) || 1;
  if (currentPage > pages) currentPage = pages;
  var start = (currentPage - 1) * PAGE_SIZE;
  var pageData = sorted.slice(start, start + PAGE_SIZE);

  var tbody = document.getElementById('tableBody');
  var empty = document.getElementById('emptyState');

  if (total === 0) {
    tbody.innerHTML = '';
    empty.style.display = 'block';
  } else {
    empty.style.display = 'none';
    tbody.innerHTML = pageData.map(function(r) {
      var id = r._id;
      var notes = trunc(r.notes, 35);
      return '<tr>' +
        '<td class="col-gbn" title="' + esc(r.gbn) + '">' + esc(r.gbn) + '</td>' +
        '<td class="col-guest" title="' + esc(r.guest) + '">' + esc(r.guest) + '</td>' +
        '<td class="col-sched" title="' + esc(cleanSchedDate(r.schedDate)) + '">' + esc(trunc(cleanSchedDate(r.schedDate), 22)) + '</td>' +
        '<td class="col-time" title="' + esc(r.time) + '">' + esc(trunc(r.time, 24)) + '</td>' +
        '<td class="col-pr">' + badgeHtml(r) + '</td>' +
        '<td class="col-status" title="' + esc(r.status) + '">' + esc(r.status || '—') + '</td>' +
        '<td class="col-notes" title="' + esc(r.notes) + '">' + esc(notes || '—') + '</td>' +
        '<td class="col-actions"><div class="row-actions">' +
          '<button class="icon-btn" onclick="editEntry(' + id + ')" title="Edit">' + editIcon() + '</button>' +
          '<button class="icon-btn delete" onclick="deleteEntry(' + id + ')" title="Delete">' + deleteIcon() + '</button>' +
        '</div></td>' +
      '</tr>';
    }).join('');
  }

  // pagination bar
  renderPagination(pages, total, start, pageData.length);
}

function deleteIcon() {
  return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>';

function renderPagination(pages, total, start, count) {
  var el = document.getElementById('pagination');
  if (total === 0) { el.innerHTML = ''; return; }
  var info = 'Showing ' + (start + 1) + '–' + (start + count) + ' of ' + total;
  var btns = '';
  btns += '<button class="page-btn" onclick="goPage(' + (currentPage - 1) + ')" ' + (currentPage === 1 ? 'disabled' : '') + '>‹</button>';
  var lo = Math.max(1, currentPage - 2), hi = Math.min(pages, currentPage + 2);
  if (lo > 1) btns += '<button class="page-btn" onclick="goPage(1)">1</button>' + (lo > 2 ? '<span style="padding:0 4px;color:var(--gray-500)">…</span>' : '');
  for (var i = lo; i <= hi; i++) {
    btns += '<button class="page-btn' + (i === currentPage ? ' active' : '') + '" onclick="goPage(' + i + ')">' + i + '</button>';
  }
  if (hi < pages) btns += (hi < pages - 1 ? '<span style="padding:0 4px;color:var(--gray-500)">…</span>' : '') + '<button class="page-btn" onclick="goPage(' + pages + ')">' + pages + '</button>';
  btns += '<button class="page-btn" onclick="goPage(' + (currentPage + 1) + ')" ' + (currentPage === pages ? 'disabled' : '') + '>›</button>';
  el.innerHTML = '<span>' + info + '</span><div class="page-btns">' + btns + '</div>';
}

function goPage(p) {
  var pages = Math.ceil(getFiltered().length / PAGE_SIZE) || 1;
  currentPage = Math.max(1, Math.min(pages, p));
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ── CLEAN SCHED DATE DISPLAY ───────────────────────────────────────────────────
// Strips leading day names (Mon, Tuesday, etc.) from stored schedDate strings
// ── CLEAN & FORMAT SCHED DATE ─────────────────────────────────────────────────
// Parses any stored schedDate string and returns "Tue, Sep 29, 2026" format
var MONTH_MAP = {
  jan:1,feb:2,mar:3,apr:4,may:5,jun:6,jul:7,aug:8,sep:9,oct:10,nov:11,dec:12,
  january:1,february:2,march:3,april:4,june:6,july:7,august:8,
  september:9,october:10,november:11,december:12
};
var DAY_NAMES  = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
var MON_NAMES  = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

function parseSchedDate(str) {
  if (!str) return null;
  var s = str.trim().toLowerCase();
  // Strip leading day names
  s = s.replace(/^(sunday|monday|tuesday|wednesday|thursday|friday|saturday),?\s*/i, '');
  s = s.replace(/^(sun|mon|tue|wed|thu|fri|sat)\.?,?\s*/i, '');
  // Strip leading comma/space artifacts like ", July 14,2026"
  s = s.replace(/^,\s*/, '');
  s = s.trim();

  // Match "Month DD, YYYY" or "Month DD YYYY"
  var m = s.match(/([a-z]+)\.?\s+(\d{1,2}),?\s*(\d{4})/);
  if (m) {
    var mon = MONTH_MAP[m[1].substring(0,3)];
    if (mon) {
      var d = new Date(parseInt(m[3]), mon - 1, parseInt(m[2]), 12);
      if (!isNaN(d.getTime())) return d;
    }
  }

  // Match "DD Month YYYY"
  m = s.match(/(\d{1,2})\s+([a-z]+)\s+(\d{4})/);
  if (m) {
    var mon = MONTH_MAP[m[2].substring(0,3)];
    if (mon) {
      var d = new Date(parseInt(m[3]), mon - 1, parseInt(m[1]), 12);
      if (!isNaN(d.getTime())) return d;
    }
  }

  // Try native Date parse as fallback
  var d = new Date(str);
  if (!isNaN(d.getTime())) return d;
  return null;
}

function formatSchedDate(str) {
  if (!str) return '';
  var d = parseSchedDate(str);
  if (!d) return str; // return original if can't parse
  return DAY_NAMES[d.getDay()] + ', ' + MON_NAMES[d.getMonth()] + ' ' + d.getDate() + ', ' + d.getFullYear();
}

function cleanSchedDate(str) {
  return formatSchedDate(str);
}

// Convert a stored schedDate string → "YYYY-MM-DD" for the date input
function schedDateToInput(str) {
  if (!str) return '';
  var d = parseSchedDate(str);
  if (!d) return '';
  var y = d.getFullYear();
  var m = String(d.getMonth() + 1).padStart(2, '0');
  var day = String(d.getDate()).padStart(2, '0');
  return y + '-' + m + '-' + day;
}

// Convert "YYYY-MM-DD" (from date input) → "Tue, Sep 29, 2026" for storage
function inputToSchedDate(val) {
  if (!val) return '';
  var d = new Date(val + 'T12:00:00');
  if (isNaN(d.getTime())) return val;
  return DAY_NAMES[d.getDay()] + ', ' + MON_NAMES[d.getMonth()] + ' ' + d.getDate() + ', ' + d.getFullYear();
}

// ── MODAL ──────────────────────────────────────────────────────────────────────
function openModal(id) {
  editingId = id || null;
  var overlay = document.getElementById('modalOverlay');
  document.getElementById('modalTitle').textContent = id ? 'Edit entry' : 'Add new entry';

  if (id) {
    var r = data.find(function(x) { return x._id === id; });
    if (r) {
      document.getElementById('f-gbn').value = r.gbn || '';
      document.getElementById('f-guest').value = r.guest || '';
      document.getElementById('f-schedDate').value = schedDateToInput(r.schedDate);
      document.getElementById('f-time').value = r.time || '';
      document.getElementById('f-prStatus').value = r.prStatus || '';
      document.getElementById('f-status').value = r.status || '';
      document.getElementById('f-notes').value = r.notes || '';
    }
  } else {
    clearForm();
  }
  overlay.classList.add('open');
  document.getElementById('f-gbn').focus();
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  editingId = null;
}

function handleOverlayClick(e) {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
}

function clearForm() {
  ['f-guest','f-schedDate','f-time','f-notes'].forEach(function(id) {
    document.getElementById(id).value = '';
  });
  document.getElementById('f-prStatus').value = '';
  document.getElementById('f-gbn').value = '';
  document.getElementById('f-status').value = '';
}

function saveEntry() {
  var gbn = document.getElementById('f-gbn').value;
  var guest = document.getElementById('f-guest').value.trim();
  if (!gbn || !guest) { toast('GBN host and author name are required.', 'error'); return; }

  var entry = {
    _id:      editingId ? String(editingId) : String(Date.now()),
    gbn:      gbn,
    guest:    guest,
    schedDate: inputToSchedDate(document.getElementById('f-schedDate').value),
    time:     document.getElementById('f-time').value.trim(),
    prStatus: document.getElementById('f-prStatus').value,
    status:   document.getElementById('f-status').value.trim(),
    notes:    document.getElementById('f-notes').value.trim()
  };

  if (editingId) {
    var idx = data.findIndex(function(x) { return x._id === editingId; });
    if (idx > -1) { data[idx] = entry; }
    saveToSheet('update', entry);
    toast('Entry updated in Google Sheets ✅', 'success');
  } else {
    entry._id = String(Date.now());
    data.unshift(entry);
    saveToSheet('add', entry);
    toast('Entry added to Google Sheets ✅', 'success');
  }

  populateFilters();
  closeModal();
  render();
}

function editEntry(id) { openModal(id); }

function deleteEntry(id) {
  if (!confirm('Delete this entry? This cannot be undone.')) return;
  var entry = data.find(function(r) { return r._id === id; });
  data = data.filter(function(r) { return r._id !== id; });
  if (entry) saveToSheet('delete', entry);
  populateFilters();
  render();
  toast('Entry deleted from Google Sheets ✅', 'success');
}

// ── EXPORT TO GOOGLE SHEETS ────────────────────────────────────────────────────
function exportCSV() {
  var headers = ['GBN Host','Author','Schedule Date','Time','PR Status','Assignee','Notes'];
  var rows = [headers];
  var filtered = sortData(getFiltered());
  filtered.forEach(function(r) {
    rows.push([r.gbn, r.guest, r.schedDate, r.time, r.prStatus, r.status, r.notes].map(function(v) {
      return '"' + (v || '').replace(/"/g, '""') + '"';
    }));
  });
  var csv = rows.map(function(r) { return r.join(','); }).join('\n');

  // Encode CSV and open in Google Sheets
  var encoded = encodeURIComponent(csv);
  var dataUri = 'data:text/csv;charset=utf-8,' + encoded;

  // Create a temporary link, trigger download with .csv, then also open Google Sheets import
  var blob = new Blob([csv], { type: 'text/csv' });
  var url = URL.createObjectURL(blob);

  // Open Google Sheets with the CSV imported via URL
  // We download first, then redirect to Google Sheets new spreadsheet
  var a = document.createElement('a');
  a.href = url;
  a.download = 'gbn-tracker-' + new Date().toISOString().slice(0,10) + '.csv';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);

  // Open Google Sheets import page after short delay
  setTimeout(function() {
    window.open('https://sheets.new', '_blank');
    toast('CSV downloaded! Import it in the new Google Sheet: File → Import → Upload.', 'success');
  }, 500);
}

// ── TOAST ──────────────────────────────────────────────────────────────────────
function toast(msg, type) {
  var c = document.getElementById('toastContainer');
  var el = document.createElement('div');
  el.className = 'toast' + (type ? ' ' + type : '');
  el.textContent = msg;
  c.appendChild(el);
  setTimeout(function() { el.remove(); }, 3000);
}

// ── KEYBOARD ───────────────────────────────────────────────────────────────────
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') closeModal();
});

  var isDark = document.body.classList.toggle('dark');
  localStorage.setItem('gbn_darkmode', isDark ? '1' : '0');
  updateDarkIcon(isDark);
}

loadData();
